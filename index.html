<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="BtoaAppV3 - Personal Management Application">
  <title>BtoaAppV3 - Login</title>
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/responsive.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="login-page">
  <div class="container-fluid">
    <div class="login-container">
      <div class="login-left">
        <div class="brand-section">
          <div class="logo">
            <i class="fas fa-shield-alt"></i>
            <span>BtoaApp</span>
          </div>
          <h1>Welcome Back</h1>
          <p>Kelola hidup Anda dengan mudah dan aman</p>
        </div>
      </div>

      <div class="login-right">
        <div class="login-form-wrapper">
          <!-- LOGIN FORM -->
          <form id="loginForm" class="auth-form active">
            <h2>Masuk ke Akun Anda</h2>
            <div class="form-group">
              <label for="loginEmail">Email Address</label>
              <input type="email" id="loginEmail" placeholder="your@email.com" required>
              <span class="error-message" id="emailError"></span>
            </div>
            <div class="form-group">
              <label for="loginPassword">Password</label>
              <input type="password" id="loginPassword" placeholder="••••••••" required>
              <span class="error-message" id="passwordError"></span>
            </div>
            <button type="submit" class="btn btn-primary btn-block">Masuk</button>
            <div class="divider"><span>atau</span></div>
            <button type="button" class="btn btn-google btn-block" id="googleLoginBtn">
              <i class="fab fa-google"></i> Masuk dengan Google
            </button>
            <p>Belum punya akun? <a href="#" id="switchToRegister">Daftar di sini</a></p>
            <p><a href="#" id="forgotPasswordLink">Lupa password?</a></p>
          </form>

          <!-- REGISTER FORM -->
          <form id="registerForm" class="auth-form" style="display:none;">
            <h2>Buat Akun Baru</h2>
            <div class="form-group">
              <label for="registerName">Nama Lengkap</label>
              <input type="text" id="registerName" placeholder="John Doe" required>
            </div>
            <div class="form-group">
              <label for="registerEmail">Email Address</label>
              <input type="email" id="registerEmail" placeholder="your@email.com" required>
              <span class="error-message" id="regEmailError"></span>
            </div>
            <div class="form-group">
              <label for="registerPassword">Password</label>
              <input type="password" id="registerPassword" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn btn-primary btn-block">Daftar</button>
            <p>Sudah punya akun? <a href="#" id="switchToLogin">Masuk di sini</a></p>
          </form>

          <!-- FORGOT PASSWORD FORM -->
          <form id="forgotForm" class="auth-form" style="display:none;">
            <h2>Reset Password</h2>
            <p>Masukkan email Anda untuk menerima link reset password</p>
            <input type="email" id="forgotEmail" placeholder="your@email.com" required>
            <span class="error-message" id="forgotError"></span>
            <button type="submit" class="btn btn-primary btn-block">Kirim Link Reset</button>
            <p>Kembali ke <a href="#" id="backToLogin">Login</a></p>
          </form>
        </div>
      </div>
    </div>
  </div>

  <!-- Script Firebase Auth Handler -->
  <script type="module">
    import { registerUser, loginUser, resetPassword, loginWithGoogle } from "./js/auth.js";

    // LOGIN
    document.getElementById("loginForm").addEventListener("submit", (e) => {
      e.preventDefault();
      const email = document.getElementById("loginEmail").value;
      const password = document.getElementById("loginPassword").value;
      loginUser(email, password)
        .then(userCredential => alert("Login berhasil: " + userCredential.user.email))
        .catch(error => document.getElementById("emailError").innerText = error.message);
    });

    // REGISTER
    document.getElementById("registerForm").addEventListener("submit", (e) => {
      e.preventDefault();
      const name = document.getElementById("registerName").value;
      const email = document.getElementById("registerEmail").value;
      const password = document.getElementById("registerPassword").value;
      registerUser(email, password)
        .then(userCredential => {
          alert("Registrasi berhasil: " + userCredential.user.email);
          // TODO: Simpan nama ke Firestore jika perlu
        })
        .catch(error => document.getElementById("regEmailError").innerText = error.message);
    });

    // RESET PASSWORD
    document.getElementById("forgotForm").addEventListener("submit", (e) => {
      e.preventDefault();
      const email = document.getElementById("forgotEmail").value;
      resetPassword(email)
        .then(() => alert("Link reset password dikirim ke " + email))
        .catch(error => document.getElementById("forgotError").innerText = error.message);
    });

    // GOOGLE LOGIN
    document.getElementById("googleLoginBtn").addEventListener("click", () => {
      loginWithGoogle()
        .then(result => alert("Login Google berhasil: " + result.user.email))
        .catch(error => alert("Login Google gagal: " + error.message));
    });

    // SWITCH FORM
    document.getElementById("switchToRegister").addEventListener("click", () => {
      document.getElementById("loginForm").style.display = "none";
      document.getElementById("registerForm").style.display = "block";
    });
    document.getElementById("switchToLogin").addEventListener("click", () => {
      document.getElementById("registerForm").style.display = "none";
      document.getElementById("loginForm").style.display = "block";
    });
    document.getElementById("forgotPasswordLink").addEventListener("click", () => {
      document.getElementById("loginForm").style.display = "none";
      document.getElementById("forgotForm").style.display = "block";
    });
    document.getElementById("backToLogin").addEventListener("click", () => {
      document.getElementById("forgotForm").style.display = "none";
      document.getElementById("loginForm").style.display = "block";
    });
  </script>
</body>
</html>
